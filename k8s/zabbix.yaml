# ─────────────────────────────────────────
# Zabbix PostgreSQL (banco do Zabbix)
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-db
  template:
    metadata:
      labels:
        app: zabbix-db
    spec:
      containers:
        - name: zabbix-db
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: zabbix-config
          volumeMounts:
            - name: zabbix-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: zabbix-db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-db-service
spec:
  selector:
    app: zabbix-db
  ports:
    - port: 5432
      targetPort: 5432

---
# ─────────────────────────────────────────
# Zabbix Server
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      containers:
        - name: zabbix-server
          image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
          ports:
            - containerPort: 10051
          envFrom:
            - configMapRef:
                name: zabbix-config
          livenessProbe:
            tcpSocket:
              port: 10051
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-server-service
spec:
  selector:
    app: zabbix-server
  ports:
    - port: 10051
      targetPort: 10051

---
# ─────────────────────────────────────────
# Zabbix Web (interface)
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:ubuntu-7.0-latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: zabbix-config
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web-service
spec:
  type: LoadBalancer
  selector:
    app: zabbix-web
  ports:
    - port: 8080
      targetPort: 8080

---
# ─────────────────────────────────────────
# Zabbix Agent (monitora o próprio cluster)
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-agent
  template:
    metadata:
      labels:
        app: zabbix-agent
    spec:
      containers:
        - name: zabbix-agent
          image: zabbix/zabbix-agent2:ubuntu-7.0-latest
          ports:
            - containerPort: 10050
          envFrom:
            - configMapRef:
                name: zabbix-config
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-agent-service
spec:
  selector:
    app: zabbix-agent
  ports:
    - port: 10050
      targetPort: 10050